<div class="user-list">
  <header class="user-list__header">
    <h2 class="user-list__title">Пользователи</h2>
    <button nz-button nzType="primary" routerLink="/users/new">
      <span nz-icon nzType="plus"></span>
      Новый пользователь
    </button>
  </header>

  <div class="user-list__toolbar">
    <nz-input-group [nzPrefix]="prefixIcon" class="user-list__search">
      <input
        nz-input
        placeholder="Поиск по имени или email…"
        [ngModel]="searchTerm()"
        (ngModelChange)="onSearchChange($event)"
      />
    </nz-input-group>
    <ng-template #prefixIcon>
      <span nz-icon nzType="search"></span>
    </ng-template>
  </div>

  @if (loading()) {
    <div class="user-list__loading">
      <nz-spin nzSize="large" nzTip="Загрузка пользователей…"></nz-spin>
    </div>
  } @else {
    @if (total() === 0) {
      <nz-empty nzNotFoundContent="По запросу ничего не найдено."></nz-empty>
    } @else {
      <nz-table
        [nzData]="pagedUsers()"
        [nzShowPagination]="false"
        nzSize="middle"
        nzBordered
      >
        <thead>
          <tr>
            <th nzWidth="80px">ID</th>
            <th>Имя</th>
            <th>Логин</th>
            <th>Email</th>
            <th>Компания</th>
            <th nzWidth="200px" nzAlign="right">Действия</th>
          </tr>
        </thead>
        <tbody>
          @for (user of pagedUsers(); track trackById($index, user)) {
            <tr>
              <td>{{ user.id }}</td>
              <td>
                <a [routerLink]="['/users', user.id]">{{ user.name }}</a>
              </td>
              <td>
                <nz-tag nzColor="blue">@{{ user.username }}</nz-tag>
              </td>
              <td>
                <a href="mailto:{{ user.email }}">{{ user.email }}</a>
              </td>
              <td>{{ user.company?.name || '—' }}</td>
              <td nzAlign="right">
                <button
                  nz-button
                  nzType="default"
                  nzSize="small"
                  nz-tooltip
                  nzTooltipTitle="Подробнее"
                  [routerLink]="['/users', user.id]"
                >
                  <span nz-icon nzType="eye"></span>
                </button>
                <button
                  nz-button
                  nzType="default"
                  nzSize="small"
                  nz-tooltip
                  nzTooltipTitle="Редактировать"
                  [routerLink]="['/users', user.id, 'edit']"
                >
                  <span nz-icon nzType="edit"></span>
                </button>
                <button
                  nz-button
                  nzType="default"
                  nzDanger
                  nzSize="small"
                  nz-popconfirm
                  nzPopconfirmTitle="Удалить этого пользователя?"
                  nzOkText="Удалить"
                  nzCancelText="Отмена"
                  (nzOnConfirm)="deleteUser(user)"
                  nz-tooltip
                  nzTooltipTitle="Удалить"
                >
                  <span nz-icon nzType="delete"></span>
                </button>
              </td>
            </tr>
          }
        </tbody>
      </nz-table>

      <div class="user-list__pagination">
        <nz-pagination
          [nzPageIndex]="pageIndex()"
          [nzTotal]="total()"
          [nzPageSize]="pageSize()"
          [nzPageSizeOptions]="[5, 10, 20, 50]"
          nzShowSizeChanger
          nzShowQuickJumper
          (nzPageIndexChange)="onPageIndexChange($event)"
          (nzPageSizeChange)="onPageSizeChange($event)"
        ></nz-pagination>
      </div>
    }
  }
</div>
